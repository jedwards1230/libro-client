# .github/dependabot.yml — Dependabot version updates (per repo-standards Wave 3)
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependency", "chore"]
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependency", "chore"]
    commit-message:
      prefix: "deps(npm)"
    groups:
      npm:
        patterns: ["*"]
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependency", "chore"]
    commit-message:
      prefix: "deps(docker)"
    groups:
      docker:
        patterns: ["*"]
