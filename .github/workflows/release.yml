# Auto-release on every merge to main.
# Default: patch bump. Use semver:minor or semver:major PR labels for bigger bumps.
# Add skip-release label to skip releasing entirely.
# Also supports manual workflow_dispatch with version override.

name: Release

run-name: "${{ github.event_name == 'workflow_dispatch' && format('Release v{0}', inputs.version) || 'Auto-release' }}"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 1.0.0) — without the 'v' prefix"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    # Skip release commits to avoid infinite loop
    if: "!startsWith(github.event.head_commit.message, 'Release v')"
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      skipped: ${{ steps.bump.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type from PR labels
        id: bump
        if: github.event_name == 'push'
        run: |
          COMMIT_SHA="${{ github.sha }}"
          PR_NUMBER=$(gh pr list --state merged --json number,mergeCommit \
            --jq ".[] | select(.mergeCommit.oid == \"${COMMIT_SHA}\") | .number" || true)

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for commit $COMMIT_SHA — using patch bump"
            echo "type=patch" >> $GITHUB_OUTPUT
            exit 0
          fi

          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' || true)

          if echo "$LABELS" | grep -q 'skip-release'; then
            echo "skip-release label found — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          elif echo "$LABELS" | grep -q 'semver:major'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q 'semver:minor'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Skip check
        if: steps.bump.outputs.skip == 'true'
        run: echo "Skipping release due to skip-release label"

      - name: Compute next version
        id: version
        if: steps.bump.outputs.skip != 'true'
        run: |
          OVERRIDE="${{ inputs.version }}"

          if [ -n "$OVERRIDE" ]; then
            if ! echo "$OVERRIDE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format '$OVERRIDE'. Expected: X.Y.Z"
              exit 1
            fi
            NEXT_VERSION="$OVERRIDE"
          else
            BUMP_TYPE="${{ steps.bump.outputs.type }}"
            LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1 || true)

            if [ -z "$LATEST_TAG" ]; then
              MAJOR=0; MINOR=0; PATCH=0
            else
              LATEST_VERSION="${LATEST_TAG#v}"
              MAJOR=$(echo "$LATEST_VERSION" | cut -d. -f1)
              MINOR=$(echo "$LATEST_VERSION" | cut -d. -f2)
              PATCH=$(echo "$LATEST_VERSION" | cut -d. -f3)
            fi

            case "$BUMP_TYPE" in
              major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          TAG="v${NEXT_VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_VERSION (tag: $TAG)"

      - name: Setup Bun
        if: steps.bump.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.bump.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Run tests
        if: steps.bump.outputs.skip != 'true'
        run: bun test

      - name: Bump package.json version
        if: steps.bump.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Commit version bump and tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Release ${TAG}" || true
          git tag -a "$TAG" -m "Release $VERSION"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | grep -B1 "^${TAG}$" | head -1)
          if [ "$PREV_TAG" = "$TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          gh release create "$TAG" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --generate-notes \
            --notes-start-tag "$PREV_TAG" \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "## Release $TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump Type | ${{ steps.bump.outputs.type || 'override' }} |" >> $GITHUB_STEP_SUMMARY

  docker:
    name: Build & Push Docker Image
    needs: release
    if: needs.release.outputs.skipped != 'true' && needs.release.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          context: .
          push: true
          tags: |
            jedwards1230/libro:latest
            jedwards1230/libro:${{ needs.release.outputs.version }}

      - name: Summary
        run: |
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`jedwards1230/libro:${{ needs.release.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`jedwards1230/libro:latest\`" >> $GITHUB_STEP_SUMMARY
