# Auto-tag + release on push to main.
#
# Reads the merged PR's `semver:*` label (defaults to patch, `skip-release`
# opts out), then delegates tag creation and AI release notes to the shared
# jedwards1230/release-workflows/ai-release.yml workflow. Builds + pushes
# the multi-arch Docker image to Docker Hub from the tag ref, then creates
# the GitHub Release with the Docker pull snippet prepended to the AI body.
#
# Publishing to npm is handled by a separate `publish-npm.yml` workflow
# that triggers off the GitHub Release event — per-repo distribution
# concerns live in this repo, not in ai-release.yml.

name: Release

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
      && format('Release: {0}{1}',
           inputs.dry_run && 'dry-run ' || '',
           inputs.bump_type)
      || format('Release: {0}', github.event.head_commit.message || github.sha)
  }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry_run:
        description: "Dry run — compute version and preview notes without tagging or releasing"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  detect:
    name: Detect bump type
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.bump.outputs.type }}
      dry_run: ${{ steps.bump.outputs.dry_run }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - name: Determine bump type
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # workflow_dispatch: use provided inputs verbatim.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "type=${{ inputs.bump_type }}"
              echo "dry_run=${{ inputs.dry_run }}"
              echo "skip=false"
            } >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "::notice::Dry run: previewing release with bump_type=${{ inputs.bump_type }}"
            fi
            exit 0
          fi

          # push event: look up labels on the PR whose merge produced this commit.
          # Retry up to 3x — GitHub may not have indexed the merge commit yet
          # right after the push event fires.
          LABELS=""
          for attempt in 1 2 3; do
            LABELS=$(gh pr list --state merged --base main --limit 100 \
              --json labels,mergeCommit \
              | jq -r --arg sha "$GITHUB_SHA" \
                '.[] | select(.mergeCommit.oid == $sha) | .labels[].name' 2>/dev/null || echo "")
            if [ -n "$LABELS" ]; then
              break
            fi
            echo "Attempt ${attempt}: no labels found for ${GITHUB_SHA}, retrying in 5s..."
            sleep 5
          done

          echo "Labels for commit ${GITHUB_SHA}: ${LABELS:-<none>}"

          if echo "$LABELS" | grep -q '^skip-release$'; then
            echo "::notice::skip-release label present — skipping release"
            {
              echo "skip=true"
              echo "type=patch"
              echo "dry_run=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$LABELS" | grep -q '^semver:major$'; then
            BUMP=major
          elif echo "$LABELS" | grep -q '^semver:minor$'; then
            BUMP=minor
          else
            # Default to patch — applies to `semver:patch` label AND no-label merges.
            BUMP=patch
          fi
          {
            echo "type=${BUMP}"
            echo "skip=false"
            echo "dry_run=false"
          } >> "$GITHUB_OUTPUT"

  prepare:
    name: Tag & Generate Notes
    needs: [detect]
    if: needs.detect.outputs.skip != 'true'
    uses: jedwards1230/release-workflows/.github/workflows/ai-release.yml@v0
    with:
      service_name: libro-client
      service_description: "a Bun-based CLI and background service for downloading audiobooks from Libro.fm"
      bump_type: ${{ needs.detect.outputs.bump_type }}
      dry_run: ${{ needs.detect.outputs.dry_run == 'true' }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  docker:
    name: Build & Push Docker Image
    needs: [detect, prepare]
    if: needs.detect.outputs.skip != 'true' && needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            jedwards1230/libro:${{ needs.prepare.outputs.version }}
            jedwards1230/libro:latest
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          {
            echo "## Docker Image"
            echo ""
            echo "| Tag | Pull |"
            echo "|-----|------|"
            echo "| \`jedwards1230/libro:${VERSION}\` | \`docker pull jedwards1230/libro:${VERSION}\` |"
            echo "| \`jedwards1230/libro:latest\` | \`docker pull jedwards1230/libro:latest\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Create GitHub Release
    needs: [detect, prepare, docker]
    if: needs.detect.outputs.skip != 'true' && needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Compose release body (install snippets + AI notes)
        env:
          BODY_B64: ${{ needs.prepare.outputs.release_body }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          # ai-release.yml emits a base64-encoded body; decode before use.
          echo "$BODY_B64" | base64 -d > /tmp/ai_body.md

          # Prepend install snippets so consumers see "how do I get this?"
          # before scrolling through the AI summary.
          {
            echo "## Install"
            echo ""
            echo "### Docker"
            echo ""
            echo '```bash'
            echo "docker pull jedwards1230/libro:${VERSION}"
            echo '```'
            echo ""
            echo "### npm"
            echo ""
            echo '```bash'
            echo "npm install -g libro-client@${VERSION}"
            echo '```'
            echo ""
            echo "---"
            echo ""
          } > /tmp/release_body.md
          cat /tmp/ai_body.md >> /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.version }}
          body_path: /tmp/release_body.md
          make_latest: true

      - name: Summary
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUMP_TYPE: ${{ needs.detect.outputs.bump_type }}
        run: |
          {
            echo "## Release ${TAG}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | ${VERSION} |"
            echo "| Bump | ${BUMP_TYPE} |"
            echo "| Image | \`jedwards1230/libro:${VERSION}\` |"
            echo ""
            echo "npm publishing is handled by \`publish-npm.yml\`, triggered automatically by the release event."
          } >> "$GITHUB_STEP_SUMMARY"
